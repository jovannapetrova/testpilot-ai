services:
  - type: web
    name: testpilot-ai-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: python -m pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        fromDatabase:
          name: testpilot-ai-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: LOG_LEVEL
        value: INFO
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: http://localhost:5173,http://127.0.0.1:5173
      - key: ENABLE_TEST_EXECUTION
        value: "false"

databases:
  - name: testpilot-ai-db
    plan: free
