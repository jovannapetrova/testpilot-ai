services:
  - type: web
    name: testpilot-ai-backend
    env: python
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: ENABLE_TEST_EXECUTION
        value: true
      - key: ENABLE_GITHUB_CLONE
        value: true
      - key: LLM_PROVIDER
        value: mock
